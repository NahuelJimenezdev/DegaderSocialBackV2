services:
  backend:
    build: .
    restart: always
    env_file: .env
    environment:
      - REDIS_HOST=redis
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - degader-network

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - degader-network

  frontend:
    build: 
      context: ../DegaderSocialFrontV2
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://degadersocial.com/api
        - VITE_ENV=production
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
        - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
        - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
        - VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}
    restart: always
    ports:
      - "8080:80"
    networks:
      - degader-network

networks:
  degader-network:
    driver: bridge

volumes:
  uploads_data:
  redis_data:
